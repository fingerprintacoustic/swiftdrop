name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    name: Lint & Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate HTML structure
        run: |
          echo "Checking HTML structure..."
          for f in *.html; do
            if [ -f "$f" ]; then
              echo "Checking: $f"
              grep -q "<!DOCTYPE html>" "$f" && echo "  ✓ DOCTYPE" || echo "  ✗ Missing DOCTYPE"
              grep -q "<html" "$f" && echo "  ✓ html tag" || echo "  ✗ Missing html"
              grep -q "</html>" "$f" && echo "  ✓ closing html" || echo "  ✗ Missing closing html"
            fi
          done

      - name: Check security documentation
        run: |
          echo "Verifying documentation..."
          [ -f SECURITY.md ] && echo "✓ SECURITY.md" || echo "✗ SECURITY.md missing"
          [ -f README.md ] && echo "✓ README.md" || echo "✗ README.md missing"
          [ -f DEPLOYMENT.md ] && echo "✓ DEPLOYMENT.md" || echo "✗ DEPLOYMENT.md missing"

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Start server
        run: |
          python3 -m http.server 8080 &
          sleep 2
          echo "Server started"

      - name: Verify server responds
        run: |
          curl -s http://localhost:8080/index.html | head -5 && echo "✓ Server responding"

      - name: Validate JSON
        run: |
          for f in *.json; do
            if [ -f "$f" ]; then
              python3 -c "import json; json.load(open('$f'))" && echo "✓ $f valid" || echo "✗ $f invalid"
            fi
          done

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List files
        run: |
          echo "## Files"
          find . -maxdepth 2 -type f \( -name "*.html" -o -name "*.json" -o -name "*.js" -o -name "*.md" \) | head -30

      - name: Check manifest
        run: |
          [ -f manifest.json ] && echo "✓ PWA manifest exists" || echo "✗ Manifest missing"
          [ -f sw.js ] && echo "✓ Service worker exists" || echo "✗ SW missing"

  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Lighthouse
        run: |
          npm install -g lighthouse || true
          python3 -m http.server 8081 &
          sleep 2
          lighthouse http://localhost:8081/index.html --output=json --output-path=lh.json --chrome-flags="--headless" --quiet || echo "Lighthouse skipped"
          kill %1 2>/dev/null || true
        continue-on-error: true

      - name: Check scores
        run: |
          if [ -f lh.json ]; then
            python3 -c "
import json
with open('lh.json') as f:
    d=json.load(f)
for k,v in d.get('categories',{}).items():
    s=int(v.get('score',0)*100)
    print(f'{k}: {s}/100')
" || echo "Parse skipped"
          else
            echo "Lighthouse report not generated"
          fi

  security:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Security scan
        run: |
          echo "Checking for hardcoded secrets..."
          if grep -r "api_key\|password\s*=" --include="*.js" --include="*.html" . 2>/dev/null | grep -v node_modules | grep -v "window.ENV"; then
            echo "⚠ Found potential secrets"
          else
            echo "✓ No obvious secrets"
          fi

  complete:
    name: Complete
    runs-on: ubuntu-latest
    needs: [lint, test, build, lighthouse, security]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Pipeline Results"
          echo "Lint: ${{ needs.lint.result }}"
          echo "Test: ${{ needs.test.result }}"  
          echo "Build: ${{ needs.build.result }}"
          echo "Lighthouse: ${{ needs.lighthouse.result }}"
          echo "Security: ${{ needs.security.result }}"
          
          if [[ "${{ needs.lint.result }}" == "success" && "${{ needs.test.result }}" == "success" && "${{ needs.build.result }}" == "success" ]]; then
            echo "✅ Core checks passed!"
          fi