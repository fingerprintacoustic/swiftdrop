name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    name: Lint & Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install HTML linter
        run: npm install -g htmlhint

      - name: Run HTML lint
        run: |
          htmlhint "**/*.html" || true
        continue-on-error: true

      - name: Check JavaScript syntax
        run: |
          for file in $(find . -name "*.html" -exec grep -l "<script>" {} \;); do
            echo "Checking: $file"
          done

      - name: Validate HTML structure
        run: |
          echo "Checking HTML structure..."
          grep -l "<!DOCTYPE html>" *.html || echo "Missing DOCTYPE"
          grep -l "<html" *.html || echo "Missing html tag"
          grep -l "</html>" *.html || echo "Missing closing html tag"

      - name: Check security headers documentation
        run: |
          echo "Verifying security documentation exists..."
          test -f SECURITY.md && echo "SECURITY.md exists"
          test -f TROUBLESHOOTING.md && echo "TROUBLESHOOTING.md exists"

  test:
    name: Browser Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Start local server
        run: |
          python3 -m http.server 8080 &
          sleep 2
          echo "Server started"

      - name: Verify server responds
        run: |
          curl -s http://localhost:8080/swiftdrop-enterprise.html | head -20

      - name: Check JavaScript syntax
        run: |
          # Extract and validate JavaScript
          grep -oP '(?<=<script>)[\s\S]*?(?=</script>)' swiftdrop-enterprise.html > temp.js
          node --check temp.js 2>&1 || echo "Syntax check completed"
          rm -f temp.js

      - name: Check for console.error usage
        run: |
          echo "Checking for console.error in production code..."
          if grep -q "console\.error" swiftdrop-enterprise.html; then
            echo "Note: console.error found (may be intentional for logging)"
          fi

  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List files
        run: |
          echo "Files to be deployed:"
          ls -la *.html *.json 2>/dev/null || echo "No HTML/JSON files in root"
          ls -la .github/workflows/ 2>/dev/null || echo "No workflows"

      - name: Validate JSON files
        run: |
          for f in *.json; do
            if [ -f "$f" ]; then
              echo "Validating $f..."
              python3 -c "import json; json.load(open('$f'))" && echo "Valid JSON" || echo "Invalid JSON"
            fi
          done

      - name: Check manifest.json
        run: |
          echo "Checking manifest.json..."
          test -f manifest.json && cat manifest.json | python3 -c "import sys,json; d=json.load(sys.stdin); print('Name:', d.get('name')); print('Icons:', len(d.get('icons',[])))"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    needs: [lint, test, build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "Deploying to staging environment..."
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"

      - name: Summary
        run: |
          echo "## Staging Deployment"
          echo "- Files: $(find . -name '*.html' -o -name '*.json' | wc -l)"
          echo "- Documentation: $(find . -name '*.md' | wc -l)"
          echo "- Status: Ready for deployment"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [lint, test, build]
    environment:
      name: production
      url: https://swiftdrop.example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pre-deployment checks
        run: |
          echo "Running pre-deployment checks..."
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          
          # Verify critical files exist
          test -f swiftdrop-enterprise.html && echo "✓ Enterprise version found"
          test -f manifest.json && echo "✓ PWA manifest found"
          test -f sw.js && echo "✓ Service worker found"
          test -f README.md && echo "✓ README found"

      - name: Generate deployment report
        run: |
          echo "## Production Deployment Report"
          echo ""
          echo "### Files"
          find . -maxdepth 1 -type f \( -name "*.html" -o -name "*.json" -o -name "*.md" -o -name "*.js" \) -exec ls -lh {} \;
          echo ""
          echo "### Directories"
          find . -maxdepth 1 -type d -exec ls -ld {} \;
          
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Lighthouse
        run: |
          npm install -g lighthouse
          
      - name: Run Lighthouse
        run: |
          # Start server
          python3 -m http.server 8080 &
          SERVER_PID=$!
          sleep 2
          
          # Run lighthouse
          lighthouse http://localhost:8080/swiftdrop-enterprise.html \
            --output=json \
            --output-path=lighthouse-report.json \
            --chrome-flags="--headless" \
            --quiet || true
          
          # Kill server
          kill $SERVER_PID 2>/dev/null || true

      - name: Check Lighthouse scores
        run: |
          if [ -f lighthouse-report.json ]; then
            cat lighthouse-report.json | python3 -c "
import sys, json
data = json.load(sys.stdin)
categories = data.get('categories', {})
print('## Lighthouse Scores')
for name, cat in categories.items():
    score = cat.get('score', 0) * 100
    print(f'{name}: {score:.0f}/100')
"
          else
            echo "Lighthouse report not generated (non-critical)"
          fi
        continue-on-error: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for sensitive data
        run: |
          echo "Checking for sensitive data in codebase..."
          
          # Check for API keys (should not exist)
          if grep -r "api_key\|apiKey\|secret\|password" --include="*.js" --include="*.html" . 2>/dev/null | grep -v "node_modules" | grep -v "//.*="; then
            echo "Warning: Potential secrets found"
          else
            echo "No obvious secrets found"
          fi
          
          # Check for console.log in production
          log_count=$(grep -c "console\.log" swiftdrop-enterprise.html 2>/dev/null || echo "0")
          echo "console.log statements: $log_count"

      - name: Verify CSP compatibility
        run: |
          echo "Checking CSP compatibility..."
          
          # Check external scripts are from trusted sources
          grep -o 'src="https://[^"]*"' swiftdrop-enterprise.html | while read url; do
            domain=$(echo "$url" | grep -oP '(?<=src="https://)[^/]+')
            echo "External: $domain"
          done

  complete:
    name: Pipeline Complete
    runs-on: ubuntu-latest
    needs: [lint, test, build, lighthouse, security-scan]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## Pipeline Results"
          echo ""
          
          # Summary
          echo "### Job Status"
          echo "- Lint: ${{ needs.lint.result }}"
          echo "- Test: ${{ needs.test.result }}"
          echo "- Build: ${{ needs.build.result }}"
          echo "- Lighthouse: ${{ needs.lighthouse.result }}"
          echo "- Security: ${{ needs.security-scan.result }}"
          
      - name: Final summary
        if: needs.lint.result == 'success' && needs.test.result == 'success'
        run: |
          echo "✅ All checks passed!"
          echo ""
          echo "Ready for deployment."